file:
- statement:
  - select_statement:
    - select_clause:
      - keyword: SELECT
      - select_clause_element:
        - column_reference:
          - naked_identifier: col
    - from_clause:
      - keyword: FROM
      - from_expression:
        - from_expression_element:
          - table_expression:
            - table_reference:
              - naked_identifier: t
    - where_clause:
      - keyword: WHERE
      - expression:
        - column_reference:
          - naked_identifier: col
        - comparison_operator:
          - raw_comparison_operator: '!'
          - raw_comparison_operator: =
        - dollar_numeric_literal: $1
- statement_terminator: ;
